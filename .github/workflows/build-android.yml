name: Build Native Android Apps

# Trigger the workflow manually via the GitHub Actions tab.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: ☕ Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 📦 Install NPM Dependencies
        run: npm install

      - name: 🏗️ Setup Native Offline Fallbacks
        run: |
          mkdir -p build
          cp -r static/* build/
          touch build/index.html
          mkdir -p apps/staff-app/android/app/src/main/assets
          mkdir -p apps/admin-app/android/app/src/main/assets

      - name: 🔐 Inject Firebase Services (Staff App)
        # GitHub action will create the google-services.json file using the base64 encoded string stored in GitHub Secrets.
        # You MUST configure a GitHub Secret named FIREBASE_STAFF_SERVICES_B64 containing the Base64 of the google-services.json file.
        run: |
          mkdir -p apps/staff-app/android/app
          echo "${{ secrets.FIREBASE_STAFF_SERVICES_B64 }}" | base64 --decode > apps/staff-app/android/app/google-services.json
        continue-on-error: true # Continues even if secret is missing (build will succeed, but push will fail on device)

      - name: 🔐 Inject Firebase Services (Admin App)
        # You MUST configure a GitHub Secret named FIREBASE_ADMIN_SERVICES_B64 containing the Base64 of the google-services.json file.
        run: |
          mkdir -p apps/admin-app/android/app
          echo "${{ secrets.FIREBASE_ADMIN_SERVICES_B64 }}" | base64 --decode > apps/admin-app/android/app/google-services.json
        continue-on-error: true

      - name: 🔄 Sync Capacitor Shells
        run: |
          npm run cap:sync:staff
          npm run cap:sync:admin

      - name: 📱 Build Staff APK (Release)
        run: |
          cd apps/staff-app/android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: 📱 Build Admin APK (Release)
        run: |
          cd apps/admin-app/android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: 🔐 Sign Release APKs
        run: |
          # Use Android Build Tools from GitHub Runner
          export APKSIGNER=$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner

          if [ -z "${{ secrets.APP_KEYSTORE_B64 }}" ]; then
            echo "🚀 Generating a brand new Production Keystore since one wasn't provided in Secrets..."
            keytool -genkey -v -keystore blancbeu.keystore -alias blancbeu -keyalg RSA -keysize 2048 -validity 10000 -storepass "blancbeu123" -keypass "blancbeu123" -dname "CN=Blancbeu, OU=App, O=Blancbeu, C=IN"
            export KS="blancbeu.keystore"
          else
            echo "✅ Using permanent secure Keystore found in GitHub Secrets!"
            echo "${{ secrets.APP_KEYSTORE_B64 }}" | base64 --decode > blancbeu.keystore
            export KS="blancbeu.keystore"
          fi
          
          # Output the SHA-1 and SHA-256 for Firebase & Deep-Link Configuration
          keytool -list -v -keystore $KS -alias blancbeu -storepass "blancbeu123" | grep -E "SHA1:|SHA256:" > sha_fingerprints.txt
          
          # Sign the Staff APK
          $APKSIGNER sign --ks $KS --ks-pass pass:blancbeu123 --key-pass pass:blancbeu123 --out apps/staff-app/android/app/build/outputs/apk/release/Blancbeu-Stylist.apk apps/staff-app/android/app/build/outputs/apk/release/app-release-unsigned.apk
          
          # Sign the Admin APK
          $APKSIGNER sign --ks $KS --ks-pass pass:blancbeu123 --key-pass pass:blancbeu123 --out apps/admin-app/android/app/build/outputs/apk/release/Blancbeu-Admin.apk apps/admin-app/android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: 📤 Upload Staff APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blancbeu-Stylist-APK
          path: apps/staff-app/android/app/build/outputs/apk/release/Blancbeu-Stylist.apk

      - name: 📤 Upload Admin APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Blancbeu-Admin-APK
          path: apps/admin-app/android/app/build/outputs/apk/release/Blancbeu-Admin.apk

      - name: 📤 Upload Keystore Details
        uses: actions/upload-artifact@v4
        with:
          name: Blancbeu-Keystore-Details
          path: |
            blancbeu.keystore
            sha_fingerprints.txt

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Blancbeu Release v1.0.${{ github.run_number }}"
          body: "Automated build release containing standalone APKs."
          prerelease: true
          files: |
            apps/staff-app/android/app/build/outputs/apk/release/Blancbeu-Stylist.apk
            apps/admin-app/android/app/build/outputs/apk/release/Blancbeu-Admin.apk
