<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>Blancbeu Staff - Offline</title>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap');

		/* LIGHT MODE (Default) */
		:root {
			--s-bg-primary: #f4f2ff;
			--s-bg-secondary: #fdfcff;
			--s-text-primary: #12091e;
			--s-text-secondary: #6b6680;
			--s-text-tertiary: #b0aac0;
			--s-grad-hero: linear-gradient(135deg, #1a0a2e 0%, #3730a3 40%, #7c3aed 100%);
			--s-accent-3-bg: rgba(244, 63, 94, 0.08);
			--s-accent-3-light: #f43f5e;
		}

		/* DARK MODE (Auto-Switch based on Phone Settings) */
		@media (prefers-color-scheme: dark) {
			:root {
				--s-bg-primary: #080510;
				--s-bg-secondary: #100e1a;
				--s-text-primary: #f0eeff;
				--s-text-secondary: #a09ab8;
				--s-text-tertiary: #60587a;
				--s-grad-hero: linear-gradient(135deg, #0d0520 0%, #1e1060 40%, #3b0764 100%);
				--s-accent-3-bg: rgba(251, 113, 133, 0.12);
				--s-accent-3-light: #fda4af;
			}
		}

		* { box-sizing: border-box; margin: 0; padding: 0; }
		
		body {
			font-family: 'Inter', -apple-system, sans-serif;
			background: var(--s-bg-primary);
			color: var(--s-text-primary);
			-webkit-font-smoothing: antialiased;
			height: 100vh;
			width: 100vw;
			overflow: hidden;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			position: relative;
			transition: background 0.3s ease, color 0.3s ease;
		}

		.splash-container {
			display: flex;
			flex-direction: column;
			align-items: center;
			text-align: center;
			padding: 2rem;
			z-index: 10;
			width: 100%;
			max-width: 400px;
		}

		.brand-mark {
			position: relative;
			width: 76px;
			height: 76px;
			border-radius: 22px;
			background: var(--s-grad-hero);
			color: white;
			display: flex;
			align-items: center;
			justify-content: center;
			box-shadow: 0 8px 32px rgba(124, 58, 237, 0.45);
			margin-bottom: 2.5rem;
			animation: float 3s ease-in-out infinite;
		}

		.brand-mark-letter {
			font-family: 'Outfit', sans-serif;
			font-size: 2.2rem;
			font-weight: 800;
			background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			background-clip: text;
		}

		.offline-icon-wrap {
			width: 100px;
			height: 100px;
			border-radius: 50%;
			background: var(--s-accent-3-bg);
			display: flex;
			align-items: center;
			justify-content: center;
			margin-bottom: 1.5rem;
			animation: pulse 2s infinite;
		}
		
		.offline-icon-wrap svg {
			width: 44px;
			height: 44px;
			stroke: var(--s-accent-3-light);
		}

		@keyframes pulse {
			0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(251, 113, 133, 0.4); }
			70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(251, 113, 133, 0); }
			100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(251, 113, 133, 0); }
		}

		@keyframes float {
			0%, 100% { transform: translateY(0px); }
			50% { transform: translateY(-8px); }
		}

		h1 {
			font-family: 'Outfit', sans-serif;
			font-size: 1.75rem;
			font-weight: 800;
			margin-bottom: 0.5rem;
			letter-spacing: -0.02em;
		}

		p {
			font-size: 0.95rem;
			color: var(--s-text-secondary);
			line-height: 1.5;
			margin-bottom: 2.5rem;
		}

		.status-indicator {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 12px 24px;
			background: rgba(124, 58, 237, 0.08);
			border-radius: 99px;
			border: 1px solid rgba(124, 58, 237, 0.15);
		}

		.spinner {
			width: 16px;
			height: 16px;
			border: 2px solid var(--s-text-secondary);
			border-top-color: transparent;
			border-radius: 50%;
			animation: spin 1s linear infinite;
		}

		@keyframes spin { 100% { transform: rotate(360deg); } }

		.status-text {
			font-size: 0.9rem;
			color: var(--s-text-secondary);
			font-weight: 500;
		}

		/* Decorative glowing orbs in background */
		.glass-orb {
			position: absolute;
			border-radius: 50%;
			filter: blur(80px);
			opacity: 0.35;
			z-index: 0;
			pointer-events: none;
		}
		.orb-1 {
			width: 300px; height: 300px;
			background: #7c3aed;
			top: -100px; left: -100px;
		}
		.orb-2 {
			width: 250px; height: 250px;
			background: #f43f5e;
			bottom: -50px; right: -50px;
		}
	</style>
</head>
<body>
	<div class="glass-orb orb-1"></div>
	<div class="glass-orb orb-2"></div>

	<div class="splash-container">
		<div class="brand-mark">
			<span class="brand-mark-letter">B</span>
		</div>

		<div class="offline-icon-wrap">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
				<path d="m2 2 20 20"/>
				<path d="M8.35 2.69A10 10 0 0 1 21.5 9v.5a5.5 5.5 0 0 1 1.09 10.36"/>
				<path d="M12.23 17.5a5.5 5.5 0 0 1-10.73-2.5V15a10 10 0 0 1 2.27-5.59"/>
			</svg>
		</div>
		
		<h1>No Connection</h1>
		<p>You are currently offline. Please check your internet connection to access the Blancbeu Staff App.</p>
		
		<div class="status-indicator">
			<div class="spinner"></div>
			<span class="status-text">Waiting for network...</span>
		</div>
	</div>

	<script>
		// --- Sync Status Bar Color with System Theme ---
		function updateThemeMeta() {
			const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
			let metaThemeColor = document.querySelector("meta[name=theme-color]");
			if (!metaThemeColor) {
				metaThemeColor = document.createElement("meta");
				metaThemeColor.name = "theme-color";
				document.head.appendChild(metaThemeColor);
			}
			metaThemeColor.content = isDark ? "#080510" : "#f4f2ff";
		}
		
		// Run on initial load
		updateThemeMeta();
		
		// Listen for system theme changes while on the offline page
		if (window.matchMedia) {
			window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateThemeMeta);
		}

		// --- Auto-Reconnect Logic ---
		if (navigator.onLine) {
			reconnect();
		}

		window.addEventListener('online', reconnect);

		setInterval(() => {
			if (navigator.onLine) {
				fetch('https://www.google.com/favicon.ico', { mode: 'no-cors', cache: 'no-store' })
					.then(() => reconnect())
					.catch(() => { /* Still offline */ });
			}
		}, 5000);

		function reconnect() {
			const text = document.querySelector('.status-text');
			const icon = document.querySelector('.offline-icon-wrap');
			
			if (text) text.innerText = 'Reconnecting...';
			if (icon) {
				icon.style.background = 'rgba(16, 185, 129, 0.12)';
				icon.style.borderColor = 'rgba(16, 185, 129, 0.2)';
				icon.style.boxShadow = '0 0 30px rgba(16, 185, 129, 0.15)';
				icon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>';
			}

			setTimeout(() => {
				window.location.reload();
			}, 800);
		}
	</script>
</body>
</html>
