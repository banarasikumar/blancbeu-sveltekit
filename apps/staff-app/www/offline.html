<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blancbeu Staff - Offline</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --bg-color: #09090b;
            --text-primary: #fafafa;
            --text-secondary: #a1a1aa;
            --accent: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.4);
            --card-glass: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(124, 58, 237, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.15), transparent 25%);
        }

        /* Animated Background Gradients layer */
        .glass-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
            z-index: 0;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: var(--accent);
            top: -100px;
            left: -50px;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: #38bdf8;
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(20px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 2.5rem;
            width: 90%;
            max-width: 400px;
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.1);
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            stroke: var(--text-primary);
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.025em;
        }

        p {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        .retry-btn {
            background: linear-gradient(135deg, var(--accent), #6d28d9);
            color: white;
            border: none;
            padding: 0.875rem 2rem;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .retry-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .retry-btn:hover::before {
            left: 100%;
        }

        .retry-btn:active {
            transform: scale(0.97);
        }

        .retry-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.4s ease;
        }

        .retry-btn.loading svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="glass-orb orb-1"></div>
    <div class="glass-orb orb-2"></div>

    <div class="container">
        <div class="icon-wrapper">
            <!-- Offline/Cloud crossed out icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m2 2 20 20"/>
                <path d="M8.35 2.69A10 10 0 0 1 21.5 9v.5a5.5 5.5 0 0 1 1.09 10.36"/>
                <path d="M12.23 17.5a5.5 5.5 0 0 1-10.73-2.5V15a10 10 0 0 1 2.27-5.59"/>
            </svg>
        </div>
        
        <h1>No Connection</h1>
        <p>You appear to be offline. Please check your internet connection to access the Blancbeu Staff App.</p>
        
        <button class="retry-btn" id="retryBtn" onclick="retryConnection()">
            <svg id="retryIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                <path d="M3 3v5h5"/>
            </svg>
            Try Again
        </button>
    </div>

    <script>
        function retryConnection() {
            const btn = document.getElementById('retryBtn');
            btn.classList.add('loading');
            btn.innerText = 'Connecting...';
            
            // Add icon back since innerText overwrites it
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>`;
            btn.innerHTML = svg + ' Connecting...';

            setTimeout(() => {
                if(navigator.onLine) {
                    window.location.reload();
                } else {
                    btn.classList.remove('loading');
                    btn.innerHTML = svg + ' Try Again';
                }
            }, 800);
        }

        // Auto reload when connection is restored
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
