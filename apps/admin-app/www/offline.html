<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>Blancbeu Admin - Offline</title>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap');

		/* LIGHT MODE (Clean Theme) */
		:root {
			--admin-bg: #f5f5f7;
			--admin-text-primary: #1c1c1e;
			--admin-text-secondary: #8e8e93;
			--admin-accent: #007aff;
			--admin-red-light: rgba(255, 59, 48, 0.12);
			--admin-red: #ff3b30;
		}

		/* DARK MODE (Gold & Noir Theme) */
		@media (prefers-color-scheme: dark) {
			:root {
				--admin-bg: #121212;
				--admin-text-primary: #ffffff;
				--admin-text-secondary: #ebebf5;
				--admin-accent: #d4af37;
				--admin-red-light: rgba(255, 69, 58, 0.15);
				--admin-red: #ff453a;
			}
		}

		* { box-sizing: border-box; margin: 0; padding: 0; }
		
		body {
			font-family: 'Inter', -apple-system, sans-serif;
			background: var(--admin-bg);
			color: var(--admin-text-primary);
			-webkit-font-smoothing: antialiased;
			height: 100vh;
			width: 100vw;
			overflow: hidden;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			position: relative;
			transition: background 0.3s ease, color 0.3s ease;
		}

		.splash-container {
			display: flex;
			flex-direction: column;
			align-items: center;
			text-align: center;
			padding: 2rem;
			z-index: 10;
			width: 100%;
			max-width: 400px;
		}

		.brand-mark {
			position: relative;
			width: 84px;
			height: 84px;
			border-radius: 50%;
			background: transparent;
			border: 2px solid var(--admin-accent);
			box-shadow: 0 0 24px rgba(212, 175, 55, 0.3);
			display: flex;
			align-items: center;
			justify-content: center;
			margin-bottom: 2.5rem;
			animation: float 3s ease-in-out infinite;
		}

		.brand-mark-letter {
			font-family: 'Outfit', sans-serif;
			font-size: 2.5rem;
			font-weight: 800;
			color: var(--admin-accent);
		}

		.offline-icon-wrap {
			width: 100px;
			height: 100px;
			border-radius: 50%;
			background: var(--admin-red-light);
			display: flex;
			align-items: center;
			justify-content: center;
			margin-bottom: 1.5rem;
			animation: pulse 2s infinite;
		}
		
		.offline-icon-wrap svg {
			width: 44px;
			height: 44px;
			stroke: var(--admin-red);
		}

		@keyframes pulse {
			0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 69, 58, 0.4); }
			70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(255, 69, 58, 0); }
			100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 69, 58, 0); }
		}

		@keyframes float {
			0%, 100% { transform: translateY(0px); }
			50% { transform: translateY(-8px); }
		}

		h1 {
			font-family: 'Outfit', sans-serif;
			font-size: 1.75rem;
			font-weight: 800;
			margin-bottom: 0.5rem;
			letter-spacing: -0.02em;
		}

		p {
			font-size: 0.95rem;
			color: var(--admin-text-secondary);
			line-height: 1.5;
			margin-bottom: 2.5rem;
		}

		.status-indicator {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 12px 24px;
			background: rgba(255, 255, 255, 0.05);
			border-radius: 99px;
			border: 1px solid rgba(255, 255, 255, 0.1);
		}

		@media (prefers-color-scheme: light) {
			.status-indicator {
				background: rgba(0, 0, 0, 0.03);
				border-color: rgba(0, 0, 0, 0.06);
			}
		}

		.spinner {
			width: 16px;
			height: 16px;
			border: 2px solid var(--admin-text-secondary);
			border-top-color: transparent;
			border-radius: 50%;
			animation: spin 1s linear infinite;
		}

		@keyframes spin { 100% { transform: rotate(360deg); } }

		.status-text {
			font-size: 0.9rem;
			color: var(--admin-text-secondary);
			font-weight: 500;
		}

		/* Decorative ambient glow behind logo */
		.glass-orb {
			position: absolute;
			top: 20%;
			left: 50%;
			transform: translate(-50%, -50%);
			width: 250px;
			height: 250px;
			border-radius: 50%;
			background: radial-gradient(circle, var(--admin-accent), transparent 70%);
			filter: blur(50px);
			opacity: 0.15;
			z-index: 0;
			pointer-events: none;
		}
	</style>
</head>
<body>
	<div class="glass-orb"></div>

	<div class="splash-container">
		<div class="brand-mark">
			<span class="brand-mark-letter">B</span>
		</div>

		<div class="offline-icon-wrap">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
				<path d="m2 2 20 20"/>
				<path d="M8.35 2.69A10 10 0 0 1 21.5 9v.5a5.5 5.5 0 0 1 1.09 10.36"/>
				<path d="M12.23 17.5a5.5 5.5 0 0 1-10.73-2.5V15a10 10 0 0 1 2.27-5.59"/>
			</svg>
		</div>
		
		<h1>No Connection</h1>
		<p>You are currently offline. Please check your internet connection to access the Blancbeu Admin App.</p>
		
		<div class="status-indicator">
			<div class="spinner"></div>
			<span class="status-text">Waiting for network...</span>
		</div>
	</div>

	<script>
		// --- Sync Status Bar Color with System Theme ---
		function updateThemeMeta() {
			const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
			let metaThemeColor = document.querySelector("meta[name=theme-color]");
			if (!metaThemeColor) {
				metaThemeColor = document.createElement("meta");
				metaThemeColor.name = "theme-color";
				document.head.appendChild(metaThemeColor);
			}
			metaThemeColor.content = isDark ? "#121212" : "#f5f5f7";
		}
		
		// Run on initial load
		updateThemeMeta();
		
		// Listen for system theme changes while on the offline page
		if (window.matchMedia) {
			window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateThemeMeta);
		}

		// --- Auto-Reconnect Logic ---
		if (navigator.onLine) {
			reconnect();
		}

		window.addEventListener('online', reconnect);

		setInterval(() => {
			if (navigator.onLine) {
				fetch('https://www.google.com/favicon.ico', { mode: 'no-cors', cache: 'no-store' })
					.then(() => reconnect())
					.catch(() => { /* Still offline */ });
			}
		}, 5000);

		function reconnect() {
			const text = document.querySelector('.status-text');
			const icon = document.querySelector('.offline-icon-wrap');
			const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
			
			const greenBg = isDark ? 'rgba(48, 209, 88, 0.15)' : 'rgba(52, 199, 89, 0.12)';
			const greenText = isDark ? '#30d158' : '#34c759';
			
			if (text) text.innerText = 'Reconnecting...';
			if (icon) {
				icon.style.background = greenBg;
				icon.style.borderColor = greenBg;
				icon.style.boxShadow = `0 0 30px ${greenBg}`;
				icon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="${greenText}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>`;
			}
			setTimeout(() => {
				window.location.href = 'https://blancbeu-sveltekit.vercel.app/admin';
			}, 800);
		}
	</script>
</body>
</html>
