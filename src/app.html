<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;700&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
		<script>
			// Capacitor Multi-App Magic Router
			// By default, the WebView opens the root path '/'.
			// We check the custom User-Agent from capacitor.config.ts
			// and redirect to the correct portal instantly.
			if (window.location.pathname === '/') {
				if (navigator.userAgent.includes('BlancbeuStaffNative')) {
					window.location.replace('/staff');
				} else if (navigator.userAgent.includes('BlancbeuAdminNative')) {
					window.location.replace('/admin');
				}
			}
		</script>
	</head>


	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
