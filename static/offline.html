<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Network Error - Blancbeu</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-sec: #64748b;
            --accent: #ca9d54;
            --accent-glow: rgba(202, 157, 84, 0.4);
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --skeleton: #f1f5f9;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0b0f19;
                --text-main: #f8fafc;
                --text-sec: #94a3b8;
                --accent: #e2b056;
                --accent-glow: rgba(226, 176, 86, 0.3);
                --card-bg: rgba(255,255,255,0.03);
                --border: rgba(255,255,255,0.08);
                --skeleton: #1e293b;
            }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            padding: 24px;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-wrapper {
            position: relative;
            margin-bottom: 32px;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            color: var(--accent);
        }

        .pulse-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 2px solid var(--accent-glow);
            animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            margin: 0 0 12px 0;
            letter-spacing: 0.5px;
        }

        p {
            color: var(--text-sec);
            font-size: 15px;
            line-height: 1.5;
            margin: 0 0 40px 0;
        }

        .retry-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            width: 100%;
            box-shadow: 0 4px 14px var(--accent-glow);
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .retry-btn:active {
            transform: scale(0.98);
        }

        .retry-btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.4s ease;
        }

        .retry-btn.loading svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .cache-notice {
            margin-top: 30px;
            padding: 12px 16px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 13px;
            color: var(--text-sec);
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
        }

        .cache-notice svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            color: var(--accent);
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <div class="pulse-ring"></div>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c3.66 0 6.93 1.46 9.34 3.83L24 11.53c-2.8 2.68-6.17 4.23-9.52 4.41"/><path d="M5.62 5.62C3.59 7.14 1.76 9.07 0 11.53l5.06 4.88C7.15 14.3 9.4 13 12 13c1.07 0 2.1.2 3.08.57"/><path d="M1 1l22 22"/><path d="M19 19H5"/></svg>
        </div>
        
        <h1>You're Offline</h1>
        <p>We cannot connect to the Blancbeu secure gateway. Please verify your connection to sync your live dashboard.</p>

        <button class="retry-btn" onclick="retryConnection(this)">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            <span>Retry Connection</span>
        </button>

        <div class="cache-notice">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
            <div>
                <strong>Cached Functionality Active</strong><br>
                Service Worker will automatically restore your offline native dashboard once network is detected.
            </div>
        </div>
    </div>

    <script>
        function retryConnection(btn) {
            btn.classList.add('loading');
            btn.querySelector('span').innerText = 'Connecting...';
            
            // Artificial delay for UX feel, then instantly re-navigate to the Live Wrapper URL.
            // If still offline, Capacitor seamlessly traps it again and reloads this page safely.
            setTimeout(() => {
                window.location.replace('https://blancbeu-sveltekit.vercel.app');
            }, 800);
        }

        // Auto-retry when the system detects internet restoration organically
        window.addEventListener('online', () => {
            document.querySelector('.retry-btn').click();
        });
    </script>
</body>
</html>
